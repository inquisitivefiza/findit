version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: lostfound_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: lostfound
      MYSQL_USER: lf_user
      MYSQL_PASSWORD: lf_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data: